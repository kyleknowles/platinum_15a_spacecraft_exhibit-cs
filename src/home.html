<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Psyche Mission Exhibit</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="scripts/dataWhenClick.js">
    </script>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {

            width: 1920px;
            height: 1080px;
            background-image: url('imgs/psyche-background.png');
        }
    </style>
    <link rel="stylesheet" href="accessibility/accessibility.css">
</head>

<body>
    
    <main id="home">
    <p id= "countdown" class="countdown"></p>
    <h1 class="home-title">MISSION TO PSYCHE:</h1>
    <h2 class="home-subtitle">Journey to a Metal World</h2>
    <p class="learn-more">CLICK HERE TO LEARN MORE</p>

    <script>

        // Click functionality
        document.body.onclick = () => {
            window.location.href = "index.html"; // go to next page
        };

        // ___________________________________________________________________
        // Countdown

        // Target date (Year, Month-1, Day, Hour, Minute, Second)
        // For countdown to arrival
        // const targetDate = new Date(2029, 9, 1, 12, 0, 0); // October 1st 12:00:00

        const startDate = new Date(2023, 9, 13, 7, 19, 0); // October, 13th 7:19:00

        function updateCountdown() {

            const now = new Date();

            

            // For countdown to arrival
            // const diff = targetDate - now;

            // For count since launch
            const diff = now - startDate;

            const seconds = Math.floor(diff / 1000) % 60;
            const minutes = Math.floor(diff / (1000 * 60)) % 60;
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const years = Math.floor(days / 365);


           

            // Countdown to arrival
            /*
            if (diff <= 0) {
                document.getElementById("countdown").textContent = "Now Arrived!!!!!";
                return;
            }

            document.getElementById("countdown").textContent =
                "TIME UNTIL ARRIVAL: " + `${years}y ${days % 365}d ${hours}h ${minutes}m ${seconds}s`;
           */
           // For count since launch
           document.getElementById("countdown").textContent =
                "TIME SINCE LAUNCH: " + `${years}y ${days % 365}d ${hours}h ${minutes}m ${seconds}s`;

        }
          





    // Update every second
    setInterval(updateCountdown, 1000);
</script>
    

    </main>
</body>


</html>
